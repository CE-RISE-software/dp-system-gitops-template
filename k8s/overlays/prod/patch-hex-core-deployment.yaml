apiVersion: apps/v1
kind: Deployment
metadata:
  name: hex-core-service
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: hex-core-service
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
