apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dp-system-prod

resources:
  - ../../base
  - namespace.yaml
  - auth-secret.example.yaml

patches:
  - path: patch-hex-core-deployment.yaml

configMapGenerator:
  - name: hex-core-env
    behavior: merge
    literals:
      - LOG_LEVEL=info
      - IO_ADAPTER_BASE_URL=https://io-adapter.example.org
      - AUTH_MODE=jwt_jwks
      - AUTH_AUDIENCE=hex-core-service

generatorOptions:
  disableNameSuffixHash: true
