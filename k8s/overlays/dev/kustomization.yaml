apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dp-system-dev

resources:
    - ../../base
    - namespace.yaml

patches:
    - path: patch-hex-core-deployment.yaml

configMapGenerator:
    - name: hex-core-env
      behavior: merge
      literals:
          - LOG_LEVEL=debug
          - IO_ADAPTER_BASE_URL=http://io-adapter.dev.svc.cluster.local
          - AUTH_MODE=none
          - AUTH_ALLOW_INSECURE_NONE=true

secretGenerator:
    - name: hex-core-auth
      behavior: create
      literals: []

generatorOptions:
    disableNameSuffixHash: true
